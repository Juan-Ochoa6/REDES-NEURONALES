<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Hipotenusa IA</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    margin-top:50px;
}

input{
    padding:10px;
    margin:10px;
}

button{
    padding:10px 20px;
}

</style>

</head>

<body>

<h1>Calculadora de Hipotenusa</h1>

<form method="POST">

    <input
        type="number"
        step="any"
        name="catetoA"
        placeholder="Cateto A"
        required
    >

    <input
        type="number"
        step="any"
        name="catetoB"
        placeholder="Cateto B"
        required
    >

    <br>

    <button type="submit">
        Calcular
    </button>

</form>

<h2>
Resultado: {{ resultado }}
</h2>

</body>
</html>
